<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coins - FrotaLand</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #141a2e, #070b18);
  color: white;
}

/* BOTÃO VOLTAR GAMER */
.btn-voltar {
  position: fixed;
  top: 20px;
  left: 20px;

  display: flex;
  align-items: center;
  justify-content: center;

  height: 42px;
  padding: 0 16px;

  background: linear-gradient(90deg,#0ea5e9,#38bdf8);
  border-radius: 25px;

  color: white;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;

  box-shadow: 0 0 10px rgba(56,189,248,0.5);
  transition: 0.2s;
  z-index: 1000;
}

.btn-voltar:hover {
  transform: translateX(-4px) scale(1.05);
  box-shadow: 0 0 18px rgba(56,189,248,1);
}

/* CONTAINER */
.container {
  max-width: 1150px;
  margin: 70px auto;
  padding: 0 20px;
}

/* TÍTULO */
.titulo {
  text-align: center;
  font-size: 32px;
  margin-bottom: 50px;
  letter-spacing: 1px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 30px;
}

/* CARD */
.card {
  background: #1c2238;
  padding: 25px;
  border-radius: 14px;
  text-align: center;
  transition: 0.3s;
  border: 1px solid rgba(56,189,248,0.15);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px rgba(56,189,248,0.4);
}

/* MAIS VENDIDO */
.card.destaque {
  border: 2px solid gold;
  box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

/* IMAGEM */
.card img {
  width: 110px;
  margin-bottom: 10px;
}

/* TEXTO */
.card h2 {
  font-size: 20px;
  margin: 10px 0;
}

/* PREÇO */
.preco {
  margin: 15px 0;
  font-size: 22px;
  font-weight: bold;
  color: #38bdf8;
}

/* BOTÃO COMPRAR */
.btn {
  display: block;
  background: linear-gradient(90deg,#0ea5e9,#38bdf8);
  padding: 12px;
  border-radius: 8px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px rgba(56,189,248,0.7);
}
</style>
</head>

<body>

<!-- BOTÃO VOLTAR -->
<a href="index.html" class="btn-voltar">⬅ Início</a>

<div class="container">

  <div class="titulo">💰 Loja de Coins</div>

  <div class="grid">

    <div class="card">
      <img src="coins1.png">
      <h2>1.500 Coins</h2>
      <div class="preco">R$ 14,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-1.500" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card">
      <img src="coins2.png">
      <h2>3.000 (+100 bônus)</h2>
      <div class="preco">R$ 29,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-3.000-(+100-bonus)" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card">
      <img src="coins3.png">
      <h2>4.500 (+200 bônus)</h2>
      <div class="preco">R$ 44,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-4.500-(+-200-de-bonus)" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card">
      <img src="coins4.png">
      <h2>7.500 (+500 bônus)</h2>
      <div class="preco">R$ 74,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-7.500-(+-500-bonus)" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card destaque">
      <img src="coins5.png">
      <h2>🔥 15.000 (+1000 bônus) - MAIS VENDIDO</h2>
      <div class="preco">R$ 144,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-15000-(+-1000-bonus)" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card">
      <img src="coins6.png">
      <h2>25.000 (+2500 bônus)</h2>
      <div class="preco">R$ 249,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-25000-(+-2500-bonus)" target="_blank">🛒 Comprar</a>
    </div>

  </div>

</div>

</body>
</html>
