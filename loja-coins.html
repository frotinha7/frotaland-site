<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coins - FrotaLand</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1f;
  color: white;
}

.container {
  max-width: 1100px;
  margin: 50px auto;
  padding: 0 20px;
}

.titulo {
  text-align: center;
  font-size: 30px;
  margin-bottom: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  background: #1c2238;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
  border: 1px solid rgba(56,189,248,0.2);
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px rgba(56,189,248,0.4);
}

.card img {
  width: 120px;
}

.preco {
  margin: 15px 0;
  font-size: 22px;
  font-weight: bold;
}

.btn {
  display: block;
  background: linear-gradient(90deg,#0ea5e9,#38bdf8);
  padding: 12px;
  border-radius: 8px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

  <div class="titulo">💰 Loja de Coins</div>

  <div class="grid">

    <div class="card">
      <img src="coins1.png">
      <h2>1.500 Coins</h2>
      <div class="preco">R$ 14,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-1.500" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card">
      <img src="coins2.png">
      <h2>3.000 (+100 bônus)</h2>
      <div class="preco">R$ 29,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-3.000-(+100-bonus)" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card">
      <img src="coins3.png">
      <h2>4.500 (+200 bônus)</h2>
      <div class="preco">R$ 44,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-4.500-(+-200-de-bonus)" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card">
      <img src="coins4.png">
      <h2>7.500 (+500 bônus)</h2>
      <div class="preco">R$ 74,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-7.500-(+-500-bonus)" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card" style="border:2px solid gold;">
      <img src="coins5.png">
      <h2>🔥 15.000 (+1000 bônus) - MAIS VENDIDO</h2>
      <div class="preco">R$ 144,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-15000-(+-1000-bonus)" target="_blank">🛒 Comprar</a>
    </div>

    <div class="card">
      <img src="coins6.png">
      <h2>25.000 (+2500 bônus)</h2>
      <div class="preco">R$ 249,90</div>
      <a class="btn" href="https://frotaland.centralcart.ai/package/coins-25000-(+-2500-bonus)" target="_blank">🛒 Comprar</a>
    </div>

  </div>

</div>

</body>
</html>
