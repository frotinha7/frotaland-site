<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrotaLand SMP</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #020502;
  font-family: Arial, sans-serif;
  color: white;
}

.container {
  max-width: 1450px;
  margin: auto;
  padding: 18px;
}

img {
  width: 100%;
  display: block;
  border-radius: 8px;
}

.top {
  display: grid;
  grid-template-columns: 2.2fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.buttons {
  text-align: center;
  margin: 22px 0;
}

.btn {
  display: inline-block;
  margin: 8px;
  padding: 15px 34px;
  background: #39ff14;
  color: #000;
  font-weight: 900;
  border-radius: 10px;
  text-decoration: none;
  box-shadow: 0 0 18px #39ff14;
  transition: .2s;
}

.btn:hover {
  transform: scale(1.05);
}

.middle {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

.cargos {
  margin-bottom: 16px;
}

.bottom {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

.rr {
  text-align: center;
  color: #39ff14;
  font-size: 22px;
  font-weight: bold;
  margin: 12px 0 20px;
  text-shadow: 0 0 10px #39ff14;
}

.footer {
  margin-top: 16px;
}

@media (max-width: 900px) {
  .top,
  .middle,
  .bottom {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <img src="banner.png" alt="FrotaLand SMP">
    <img src="regras.png" alt="Regras FrotaLand">
  </div>

  <div class="buttons">
    <a class="btn" href="https://discord.gg/prvDEs4hkT" target="_blank">JOGAR AGORA</a>
    <a class="btn" href="https://frotaland.centralcart.ai" target="_blank">LOJA OFICIAL</a>
    <a class="btn" href="https://discord.gg/prvDEs4hkT" target="_blank">DISCORD</a>
  </div>

  <div class="middle">
    <a href="https://frotaland.centralcart.ai" target="_blank">
      <img src="loja.png" alt="Loja Oficial">
    </a>

    <img src="evento.png" alt="Evento">

    <img src="reinicio.png" alt="Reinício do Servidor">
  </div>

  <div class="rr">
    Reinício automático do servidor a cada 6 horas
  </div>

  <div class="cargos">
    <img src="cargos.png" alt="Cargos FrotaLand">
  </div>

  <div class="bottom">
    <img src="comandos.png" alt="Comandos úteis">

    <a href="https://discord.gg/prvDEs4hkT" target="_blank">
      <img src="discord.png" alt="Discord FrotaLand">
    </a>

    <img src="bemvindo.png" alt="Bem-vindo">
  </div>

  <div class="footer">
    <img src="rodape.png" alt="Explore Construa Sobreviva">
  </div>

</div>

</body>
</html>
