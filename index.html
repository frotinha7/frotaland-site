<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Frotaland SMP</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url('https://images.unsplash.com/photo-1606112219348-204d7d8b94ee') no-repeat center center/cover;
    color: white;
    text-align: center;
}

/* overlay escuro */
.overlay {
    background: rgba(0, 0, 0, 0.75);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(0, 255, 255, 0.05);
    border: 1px solid #00eaff;
    border-radius: 20px;
    padding: 50px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
}

h1 {
    font-size: 60px;
    color: #00eaff;
    text-shadow: 0 0 20px #00eaff;
}

p {
    font-size: 20px;
    margin-bottom: 20px;
}

/* info boxes */
.info {
    display: inline-block;
    margin: 5px;
    padding: 10px 20px;
    border: 1px solid #00eaff;
    border-radius: 10px;
    font-size: 14px;
}

/* botões */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 15px 35px;
    background: #00eaff;
    color: black;
    border-radius: 10px;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00eaff;
}

/* botão secundário */
.btn-outline {
    background: transparent;
    border: 1px solid #00eaff;
    color: #00eaff;
}

.features {
    margin-top: 30px;
}

.feature {
    display: inline-block;
    margin: 10px;
    padding: 15px 25px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="overlay">
<div class="container">

<h1>FROTALAND SMP</h1>

<p>Servidor Minecraft ATM10 com aventura, economia, TRADE, RP e comunidade ativa.</p>

<div>
    <span class="info">IP: jogar.frotaland.com.br</span>
    <span class="info">Versão: 1.21.1</span>
    <span class="info">Modpack: ATM10</span>
</div>

<br>

<a class="btn" href="minecraft://jogar.frotaland.com.br">JOGAR AGORA</a>
<a class="btn btn-outline" href="https://discord.gg/prvDEs4hkT" target="_blank">DISCORD</a>

<div class="features">
    <div class="feature">⚔️ Survival RPG & RP</div>
    <div class="feature">💰 Economia balanceada</div>
    <div class="feature">🛡️ TRADE E SHOP</div>
    <div class="feature">🎁 Eventos & VIPs</div>
</div>

</div>
</div>

</body>
</html>
